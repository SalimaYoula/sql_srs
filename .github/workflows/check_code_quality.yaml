name: check_code_quality
on: pull_request
jobs:
    black_code:
      runs-on: ubuntu-20.04
      steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-python@v4
          with:
            python-version: 3.9
        - run: |
            python -n pip install --upgrage pip
            pip install black
        - run: | 
            black --check --verbose .
